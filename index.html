<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 홈 화면 바로가기 및 브라우저 아이콘 -->
<meta name="theme-color" content="#6BBF8A">
<!-- PWA 설정 -->
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="유치원 수첩">
<meta name="mobile-web-app-capable" content="yes">

<title>유치원 수첩</title>
<style>
:root{
  --paper:#FAF9F4; --card:#FFFFFF; --ink:#28322C; --sub:#6B7A70; --line:#E4E7E0;
  --green:#2F7D5B; --greenDark:#226045; --greenTint:#EAF4EE;
  --yellow:#FFC945; --yellowTint:#FFF6DC; --coral:#DE5A3E; --coralTint:#FBEBE6;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body{margin:0; background:var(--paper); color:var(--ink); font-family:'Noto Sans KR',-apple-system,sans-serif;}
button{font-family:inherit; cursor:pointer;}
input,textarea{font-family:inherit; color:var(--ink);}
button:focus-visible, input:focus-visible, textarea:focus-visible{outline:2px solid var(--green); outline-offset:2px;}
.jua{font-family:'Jua',sans-serif; font-weight:400;}

header{position:sticky; top:0; z-index:10; background:var(--green); color:#fff; padding:14px 18px 12px; box-shadow:0 2px 8px rgba(40,50,44,.12);}
.header-inner{max-width:640px; margin:0 auto; display:flex; align-items:center; justify-content:space-between;}
.header-left{display:flex; align-items:center; gap:10px;}
.back-btn{background:rgba(255,255,255,.18); border:none; color:#fff; border-radius:10px; width:34px; height:34px; font-size:18px;}
h1{margin:0; font-size:20px; letter-spacing:.3px;}
.subtitle{font-size:11.5px; opacity:.85; margin-top:1px;}
.save-state{font-size:11.5px; opacity:.9; min-width:64px; text-align:right;}

main{max-width:640px; margin:0 auto; padding:18px 16px 96px;}

nav.bottom{position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--line); z-index:10;}
.nav-inner{max-width:640px; margin:0 auto; display:flex;}
.nav-tab{flex:1; padding:10px 0 12px; background:none; border:none; border-top:2.5px solid transparent; color:var(--sub); font-weight:500; font-size:12.5px;}
.nav-tab.active{color:var(--green); font-weight:700; border-top-color:var(--green);}
.nav-tab .icon{font-size:19px; margin-bottom:2px;}

.stamp{border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; transform:rotate(-6deg); flex-shrink:0;}
.stamp.filled{background:var(--yellow); border:2.5px solid var(--ink); box-shadow:2px 3px 0 rgba(40,50,44,.15);}
.stamp.empty{background:var(--paper); border:2px dashed var(--line);}
.stamp .num{font-family:'Jua',sans-serif; line-height:1;}
.stamp .den{font-weight:600;}

.card{background:var(--card); border:1px solid var(--line); border-radius:16px;}

.kg-card{width:100%; text-align:left; padding:16px; margin-bottom:12px; display:flex; gap:14px; align-items:center; box-shadow:0 1px 3px rgba(40,50,44,.05);}
.kg-name{font-size:17px; margin-bottom:4px;}
.kg-meta{font-size:12.5px; color:var(--sub); display:flex; flex-wrap:wrap; gap:4px 10px;}
.chev{color:var(--line); font-size:20px;}

.add-btn{width:100%; padding:15px 0; border-radius:16px; border:2px dashed var(--green); background:var(--greenTint); color:var(--greenDark); font-size:16px;}

.empty-state{text-align:center; padding:56px 20px 40px;}
.empty-state .emoji{font-size:44px; margin-bottom:12px;}
.empty-state p{margin:0 0 6px; color:var(--sub); font-size:13.5px; line-height:1.6;}
.empty-state .lead{font-size:18px; color:var(--ink); margin-bottom:6px;}

.hint{font-size:12px; color:var(--sub); line-height:1.7; margin-top:18px; padding:0 4px;}

.detail-head{padding:16px; display:flex; gap:14px; align-items:center;}
.name-input{width:100%; border:none; border-bottom:2px solid var(--line); background:transparent; font-size:18px; padding:4px 0 6px;}
.disq-warn{margin-top:8px; font-size:12.5px; color:var(--coral); background:var(--coralTint); border-radius:8px; padding:5px 10px; font-weight:700;}
label.small{font-size:11.5px; color:var(--sub); font-weight:600;}

.tabbar{display:flex; gap:8px; margin:14px 0 4px;}
.tab-btn{flex:1; padding:10px 0; border-radius:12px; border:none; font-weight:700; font-size:13.5px; background:var(--card); color:var(--sub); box-shadow:inset 0 0 0 1px var(--line);}
.tab-btn.active{background:var(--green); color:#fff; box-shadow:none;}

.section-title{display:flex; align-items:center; gap:8px; margin:26px 4px 12px;}
.section-title .dot{width:8px; height:8px; border-radius:2px; background:var(--green); transform:rotate(45deg);}
.section-title h3{margin:0; font-size:17px;}
.section-title .badge{margin-left:auto; font-size:12.5px; font-weight:700; border-radius:8px; padding:3px 9px;}

.item-row{padding:13px 14px;}
.item-row + .item-row{border-top:1px solid var(--line);}
.item-label{font-size:14px; margin-bottom:9px; line-height:1.45; display:flex; align-items:flex-start; gap:7px;}
.type-badge{flex-shrink:0; font-size:10.5px; font-weight:800; border-radius:6px; padding:2px 6px; margin-top:1px;}
.item-q{font-size:12px; color:var(--sub); line-height:1.5; margin:-4px 0 9px; padding-left:2px;}
.item-q .qmark{color:var(--green); font-weight:800; margin-right:3px;}

/* 질문지 탭 */
.q-intro{font-size:12.5px; color:var(--sub); line-height:1.7; margin:10px 4px 0;}
.q-cat{margin-top:20px;}
.q-cat-title{font-family:'Jua',sans-serif; font-size:16px; margin:0 4px 8px; display:flex; align-items:center; gap:7px;}
.q-list{background:var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden;}
.q-item{padding:12px 14px; display:flex; gap:9px; align-items:flex-start;}
.q-item + .q-item{border-top:1px solid var(--line);}
.q-item .q-text{font-size:13.5px; line-height:1.5;}
.q-item .q-sub{font-size:11.5px; color:var(--sub); margin-top:2px; line-height:1.45;}
.copy-btn{width:100%; padding:12px 0; border-radius:14px; border:1.5px solid var(--green); background:var(--greenTint); color:var(--greenDark); font-size:14px; font-weight:700; margin-top:16px;}
.chips{display:flex; gap:8px;}
.chip{width:42px; height:42px; border-radius:50%; border:1.5px solid var(--line); background:var(--card); color:var(--sub); font-family:'Jua',sans-serif; font-size:17px;}
.chip.on{border:2px solid var(--greenDark); background:var(--green); color:#fff;}

.disq-hdr{padding:10px 14px; font-size:12.5px; color:var(--coral); background:var(--coralTint); font-weight:600;}
.disq-row{padding:12px 14px; border-top:1px solid var(--line); display:flex; align-items:center; gap:10px;}
.disq-row .label{flex:1; font-size:14px; line-height:1.4;}
.ox-btn{width:40px; height:36px; border-radius:10px; font-weight:800; font-size:15px; border:1.5px solid var(--line); background:var(--card); color:var(--sub);}
.ox-btn.on-o{background:var(--green); color:#fff; border:none;}
.ox-btn.on-x{background:var(--coral); color:#fff; border:none;}

.stars button{background:none; border:none; padding:2px; font-size:30px; line-height:1; color:var(--line);}
.stars button.on{color:var(--yellow);}

.final-box{background:var(--yellowTint); border:1px solid var(--yellow); border-radius:16px; padding:16px;}
.final-q{font-family:'Jua',sans-serif; font-size:15px; margin-bottom:12px; line-height:1.5;}
.final-opt{display:block; width:100%; text-align:left; padding:11px 14px; margin-bottom:8px; border-radius:12px; font-size:14px; font-weight:500; border:1.5px solid var(--line); background:var(--card); color:var(--ink);}
.final-opt.on{border:2px solid var(--green); background:var(--greenTint); color:var(--greenDark); font-weight:700;}

textarea.memo{width:100%; min-height:96px; border-radius:16px; border:1px solid var(--line); background:var(--card); padding:14px; font-size:14px; line-height:1.6; resize:vertical;}

.info-group{margin-top:12px; overflow:hidden;}
.info-hdr{width:100%; display:flex; align-items:center; padding:13px 14px; background:var(--card); border:none; text-align:left;}
.info-hdr.open{background:var(--greenTint);}
.info-hdr .gname{font-size:15px; flex:1;}
.info-hdr .count{font-size:12px; color:var(--sub); margin-right:8px;}
.info-hdr .arrow{color:var(--sub); transition:transform .15s;}
.info-hdr.open .arrow{transform:rotate(90deg);}
.info-field{padding:10px 14px; border-top:1px solid var(--line);}
.info-field input{width:100%; border:none; border-bottom:1.5px solid var(--line); background:transparent; font-size:14.5px; padding:3px 0 6px;}

.del-zone{margin-top:28px; text-align:center;}
.del-link{background:none; border:none; color:var(--sub); font-size:13px; text-decoration:underline;}
.del-confirm{background:var(--coralTint); border-radius:12px; padding:14px; font-size:13.5px;}
.del-confirm .msg{margin-bottom:10px; color:var(--coral); font-weight:700;}
.btn-danger{background:var(--coral); color:#fff; border:none; border-radius:10px; padding:8px 18px; font-weight:700; margin-right:8px;}
.btn-cancel{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:8px 18px;}

.best-card{padding:16px; margin-bottom:16px; display:flex; gap:14px; align-items:center; border:2px solid var(--yellow);}
.best-label{font-size:11.5px; color:#C9971C; font-weight:800; letter-spacing:1px;}
.best-name{font-family:'Jua',sans-serif; font-size:19px;}

.table-wrap{overflow-x:auto; border-radius:16px;}
table{border-collapse:collapse; width:100%; font-size:13px;}
th,td{padding:11px 10px; border-bottom:1px solid var(--line);}
th{position:sticky; top:0; background:#fff; text-align:left; font-size:12px; color:var(--sub); border-bottom:2px solid var(--line);}
td.label-col, th.label-col{position:sticky; left:0; background:#fff; white-space:nowrap; min-width:108px;}
td{text-align:center;}
.link-btn{background:none; border:none; font-family:'Jua',sans-serif; font-size:13.5px; color:var(--greenDark); text-decoration:underline; padding:0;}
tr.total-row{background:var(--greenTint);}
.total-row td.big{font-family:'Jua',sans-serif; font-size:17px;}

.toolbar{display:flex; gap:8px; margin-bottom:14px;}
.tool-btn{flex:1; padding:11px 0; border-radius:14px; border:1.5px solid var(--line); background:var(--card); color:var(--ink); font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:6px;}
.tool-btn.primary{background:var(--green); border:none; color:#fff;}

.modal-backdrop{position:fixed; inset:0; background:rgba(40,50,44,.45); z-index:50; display:flex; align-items:center; justify-content:center; padding:20px;}
.modal-box{background:var(--card); border-radius:18px; padding:22px; max-width:400px; width:100%; box-shadow:0 10px 40px rgba(0,0,0,.2);}
.modal-title{font-family:'Jua',sans-serif; font-size:17px; margin-bottom:10px;}
.modal-body{font-size:13.5px; color:var(--sub); line-height:1.7; margin-bottom:18px;}
.modal-body b{color:var(--ink);}
.modal-actions{display:flex; gap:8px;}
.modal-actions button{flex:1; padding:11px 0; border-radius:12px; font-weight:700; font-size:13.5px; border:none;}
.modal-actions .confirm{background:var(--green); color:#fff;}
.modal-actions .cancel{background:var(--paper); color:var(--ink); border:1px solid var(--line) !important;}
.toast{position:fixed; bottom:76px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px; border-radius:12px; font-size:13px; z-index:60; box-shadow:0 4px 16px rgba(0,0,0,.2);}

@media (prefers-reduced-motion: reduce){ *{transition:none !important;} }

/* =========================================================
   프리미엄 모바일 UI 리디자인
   - 기존 데이터 구조와 JavaScript 동작은 그대로 유지
   - 외부 CSS/JS 없이 단일 HTML에서 동작
   ========================================================= */
:root{
  --paper:#FAF8F2;
  --card:#FFFFFF;
  --ink:#26342C;
  --sub:#748078;
  --line:#E8ECE7;
  --green:#6BBF8A;
  --greenDark:#357B53;
  --greenTint:#EDF8F1;
  --yellow:#FFD66B;
  --yellowTint:#FFF7D8;
  --coral:#DD6B57;
  --coralTint:#FFF0EC;
  --shadow-sm:0 6px 18px rgba(48,78,59,.07);
  --shadow-md:0 14px 36px rgba(48,78,59,.11);
  --shadow-lg:0 24px 58px rgba(48,78,59,.16);
  --radius:20px;
}

html{scroll-behavior:smooth;}
body{
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(255,214,107,.22), transparent 30%),
    radial-gradient(circle at top right, rgba(107,191,138,.16), transparent 28%),
    var(--paper);
  font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
  letter-spacing:-.015em;
}
button,input,textarea{font:inherit;}
button{touch-action:manipulation;}
.jua{font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;font-weight:800;}

.app-hero{
  position:relative;
  top:auto;
  background:linear-gradient(145deg,rgba(255,255,255,.94),rgba(246,252,248,.94));
  color:var(--ink);
  padding:22px 18px 26px;
  border-bottom:1px solid rgba(107,191,138,.17);
  box-shadow:0 12px 34px rgba(52,92,67,.08);
  overflow:hidden;
}
.app-hero::before,
.app-hero::after{
  content:"";
  position:absolute;
  border-radius:999px;
  pointer-events:none;
}
.app-hero::before{
  width:180px;height:180px;right:-72px;top:-84px;
  background:rgba(255,214,107,.28);
}
.app-hero::after{
  width:130px;height:130px;left:-70px;bottom:-70px;
  background:rgba(107,191,138,.18);
}
.premium-header{
  position:relative;
  z-index:1;
  max-width:720px;
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:12px;
}
.hero-profile{
  grid-column:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  min-width:0;
}
.hero-avatar{
  width:clamp(96px,28vw,138px);
  aspect-ratio:1;
  object-fit:cover;
  object-position:center 34%;
  border-radius:50%;
  border:6px solid #fff;
  box-shadow:0 14px 34px rgba(69,102,79,.2);
  background:#fff;
  margin-bottom:13px;
  animation:avatarIn .7s cubic-bezier(.2,.75,.25,1) both;
}
.hero-copy{animation:slideFade .65s .08s ease both;}
.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin-bottom:6px;
  padding:6px 11px;
  border-radius:999px;
  background:var(--greenTint);
  color:var(--greenDark);
  font-size:12px;
  font-weight:800;
}
h1{
  font-size:clamp(27px,7vw,38px);
  line-height:1.15;
  margin:0;
  color:var(--ink);
  letter-spacing:-.04em;
}
.hero-tagline{
  margin-top:8px;
  color:#536159;
  font-size:14px;
  font-weight:600;
}
.subtitle{
  margin-top:5px;
  color:var(--sub);
  font-size:12px;
  opacity:1;
}
.save-state{
  grid-column:3;
  align-self:start;
  color:var(--greenDark);
  font-size:11px;
  font-weight:800;
  min-width:58px;
}
.back-btn{
  grid-column:1;
  align-self:start;
  width:42px;height:42px;
  border-radius:14px;
  background:#fff;
  color:var(--greenDark);
  box-shadow:var(--shadow-sm);
  border:1px solid rgba(107,191,138,.18);
  font-size:24px;
  transition:transform .18s ease,box-shadow .18s ease;
}

main{
  max-width:720px;
  padding:22px 16px 112px;
  animation:pageIn .5s ease both;
}

.card,
.q-list,
.final-box,
textarea.memo,
.table-wrap,
.modal-box{
  border-radius:var(--radius);
  border:1px solid rgba(43,91,60,.08);
  box-shadow:var(--shadow-sm);
}
.card{
  transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;
  animation:cardIn .48s ease both;
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
  border-color:rgba(107,191,138,.28);
}

.toolbar{gap:10px;margin-bottom:18px;}
.tool-btn,
.add-btn,
.copy-btn,
.tab-btn,
.final-opt,
.modal-actions button,
.btn-danger,
.btn-cancel{
  min-height:46px;
  border-radius:15px;
  font-weight:800;
  transition:transform .12s ease,box-shadow .18s ease,filter .18s ease;
}
.tool-btn:active,
.add-btn:active,
.copy-btn:active,
.tab-btn:active,
.final-opt:active,
.modal-actions button:active,
.btn-danger:active,
.btn-cancel:active,
.chip:active,
.ox-btn:active{
  transform:translateY(2px) scale(.985);
}
.tool-btn{
  border:1px solid rgba(107,191,138,.18);
  box-shadow:0 5px 15px rgba(53,123,83,.06);
}
.tool-btn.primary,
.tab-btn.active,
.modal-actions .confirm{
  background:linear-gradient(145deg,var(--green),#58AE78);
  box-shadow:0 9px 20px rgba(88,174,120,.24);
}
.add-btn{
  background:linear-gradient(145deg,var(--green),#59AD78);
  color:#fff;
  border:none;
  box-shadow:0 12px 26px rgba(88,174,120,.24);
  font-size:15px;
}
.copy-btn{
  background:var(--greenTint);
  border:1px solid rgba(107,191,138,.38);
  color:var(--greenDark);
}

.kg-card{
  border-radius:20px;
  padding:17px;
  margin-bottom:14px;
  box-shadow:var(--shadow-sm);
}
.kg-name{font-size:18px;letter-spacing:-.03em;}
.kg-meta{margin-top:5px;line-height:1.55;}
.chev{
  width:34px;height:34px;
  display:grid;place-items:center;
  border-radius:12px;
  background:var(--greenTint);
  color:var(--greenDark);
}

.stamp.filled{
  background:linear-gradient(145deg,var(--yellow),#FFE69A);
  border:3px solid #fff;
  outline:2px solid rgba(53,123,83,.38);
  box-shadow:0 8px 20px rgba(179,145,47,.18);
}
.stamp.empty{
  background:#FBFCFA;
  border:2px dashed rgba(107,191,138,.35);
}

.empty-state{
  margin-bottom:16px;
  padding:48px 22px 38px;
  background:rgba(255,255,255,.72);
  border:1px solid rgba(107,191,138,.12);
  border-radius:24px;
  box-shadow:var(--shadow-sm);
}
.empty-state .emoji{filter:drop-shadow(0 7px 10px rgba(53,123,83,.16));}
.empty-state .lead{font-size:20px;}

.detail-head{padding:18px;border-radius:22px;}
.name-input{
  border-bottom:2px solid rgba(107,191,138,.24);
  font-size:19px;
}
.name-input:focus{border-bottom-color:var(--green);}

.tabbar{
  position:sticky;
  top:8px;
  z-index:8;
  padding:6px;
  margin:16px 0 8px;
  background:rgba(255,255,255,.84);
  backdrop-filter:blur(16px);
  border:1px solid rgba(107,191,138,.12);
  border-radius:18px;
  box-shadow:var(--shadow-sm);
}
.tab-btn{box-shadow:none;background:transparent;}

.section-title{margin:28px 4px 12px;}
.section-title .dot{
  width:10px;height:10px;
  border-radius:4px;
  background:linear-gradient(145deg,var(--green),#8BD2A4);
}
.section-title h3{font-size:18px;}
.section-title .badge{border-radius:999px;padding:5px 10px;}

.item-row{padding:16px;}
.item-label{font-size:14.5px;}
.type-badge{border-radius:999px;padding:3px 8px;}
.chips{gap:7px;justify-content:space-between;}
.chip{
  width:44px;height:44px;
  border:none;
  background:#F7F9F6;
  box-shadow:inset 0 0 0 1px var(--line);
  transition:transform .12s ease,box-shadow .18s ease,background .18s ease;
}
.chip.on{
  background:linear-gradient(145deg,var(--green),#59AD78);
  border:none;
  box-shadow:0 7px 15px rgba(88,174,120,.25);
}

.disq-hdr{padding:12px 15px;border-radius:20px 20px 0 0;}
.ox-btn{
  border-radius:12px;
  background:#F8FAF7;
  transition:transform .12s ease,box-shadow .18s ease;
}
.ox-btn.on-o{box-shadow:0 7px 15px rgba(88,174,120,.22);}
.ox-btn.on-x{box-shadow:0 7px 15px rgba(221,107,87,.22);}

.stars button{
  transition:transform .15s ease,filter .15s ease;
}
.stars button:hover{transform:scale(1.12);}
.stars button.on{filter:drop-shadow(0 4px 5px rgba(216,169,38,.24));}

.final-box{
  background:linear-gradient(145deg,#FFF9E7,#FFF4C8);
  border-color:rgba(255,214,107,.65);
  padding:18px;
}
.final-opt{box-shadow:0 4px 12px rgba(61,76,66,.04);}
.final-opt.on{
  background:var(--greenTint);
  box-shadow:0 8px 18px rgba(88,174,120,.14);
}

textarea.memo{
  min-height:130px;
  padding:16px;
  border-color:rgba(107,191,138,.18);
}
textarea.memo:focus{
  outline:none;
  border-color:var(--green);
  box-shadow:0 0 0 4px rgba(107,191,138,.12);
}

.info-group{border-radius:20px;}
.info-hdr{padding:15px 16px;}
.info-hdr.open{background:linear-gradient(145deg,var(--greenTint),#F7FBF8);}
.info-field{padding:13px 16px;}
.info-field input:focus{border-bottom-color:var(--green);outline:none;}

.best-card{
  border:2px solid rgba(255,214,107,.8);
  background:linear-gradient(145deg,#fff,#FFFDF5);
  box-shadow:var(--shadow-md);
}
.table-wrap{background:#fff;}
th{background:#FCFDFB;}
td.label-col,th.label-col{background:#fff;}
tr.total-row{background:var(--greenTint);}

nav.bottom{
  bottom:12px;
  left:50%;
  right:auto;
  transform:translateX(-50%);
  width:min(calc(100% - 24px),696px);
  border:1px solid rgba(107,191,138,.14);
  border-radius:22px;
  box-shadow:0 16px 38px rgba(42,73,53,.16);
  overflow:hidden;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(18px);
}
.nav-inner{max-width:none;}
.nav-tab{
  padding:11px 0 12px;
  border-top:none;
  border-radius:17px;
  margin:5px;
  transition:background .18s ease,color .18s ease,transform .12s ease;
}
.nav-tab.active{
  color:var(--greenDark);
  background:var(--greenTint);
  border-top-color:transparent;
}
.nav-tab:active{transform:scale(.98);}

.modal-backdrop{
  background:rgba(31,47,37,.42);
  backdrop-filter:blur(8px);
}
.modal-box{
  border-radius:24px;
  padding:24px;
  box-shadow:var(--shadow-lg);
}
.toast{
  bottom:94px;
  border-radius:999px;
  padding:11px 18px;
  background:rgba(38,52,44,.94);
  backdrop-filter:blur(10px);
}

@keyframes pageIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:none}
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:none}
}
@keyframes slideFade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:none}
}
@keyframes avatarIn{
  from{opacity:0;transform:scale(.9) translateY(8px)}
  to{opacity:1;transform:none}
}

@media (min-width:640px){
  .app-hero{padding-top:28px;padding-bottom:30px;}
  .hero-profile{flex-direction:row;text-align:left;justify-content:center;gap:22px;}
  .hero-avatar{margin-bottom:0;}
  main{padding-left:20px;padding-right:20px;}
}

@media (max-width:420px){
  .app-hero{padding-left:12px;padding-right:12px;}
  .premium-header{gap:7px;}
  .hero-avatar{border-width:5px;}
  .hero-tagline{font-size:13px;}
  .toolbar{display:grid;grid-template-columns:1fr 1fr;}
  .chips{gap:5px;}
  .chip{width:41px;height:41px;}
  .kg-card{padding:15px 13px;gap:11px;}
  .stamp{transform:rotate(-4deg);}
}

@media (hover:none){
  .card:hover{transform:none;box-shadow:var(--shadow-sm);}
}

@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto;}
  *,*::before,*::after{animation:none!important;transition:none!important;}
}


/* 사용 안내 카드 */
.usage-guide{
  margin-top:18px;
  padding:18px;
  background:linear-gradient(145deg,#FFFFFF,#F7FBF8);
  border:1px solid rgba(107,191,138,.18);
  border-radius:22px;
  box-shadow:var(--shadow-sm);
}
.usage-guide h2{
  margin:0 0 6px;
  font-size:19px;
  letter-spacing:-.035em;
}
.usage-guide .guide-lead{
  margin:0 0 14px;
  color:var(--sub);
  font-size:13px;
  line-height:1.65;
}
.guide-grid{
  display:grid;
  gap:10px;
}
.guide-item{
  border:1px solid var(--line);
  border-radius:16px;
  background:#fff;
  overflow:hidden;
}
.guide-item summary{
  list-style:none;
  cursor:pointer;
  padding:14px 15px;
  font-size:14px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.guide-item summary::-webkit-details-marker{display:none;}
.guide-item summary::after{
  content:"＋";
  color:var(--greenDark);
  font-size:18px;
  line-height:1;
}
.guide-item[open] summary::after{content:"－";}
.guide-body{
  padding:0 15px 15px;
  color:#526057;
  font-size:13px;
  line-height:1.75;
}
.guide-body ol,
.guide-body ul{
  margin:8px 0 0;
  padding-left:20px;
}
.guide-body li+li{margin-top:5px;}
.guide-note{
  margin-top:10px;
  padding:10px 12px;
  border-radius:12px;
  background:var(--yellowTint);
  color:#6F5A16;
  font-size:12px;
  line-height:1.65;
}


/* 홈 화면 추가 안내 */
.install-card{
  margin:22px 0 18px;
  padding:16px;
  display:flex;
  align-items:center;
  gap:14px;
  background:linear-gradient(145deg,#FFFFFF,#F0F9F4);
  border:1px solid rgba(107,191,138,.22);
  border-radius:22px;
  box-shadow:var(--shadow-sm);
}
.install-card-icon{
  width:48px;
  height:48px;
  flex:0 0 48px;
  border-radius:17px;
  display:grid;
  place-items:center;
  font-size:23px;
  background:var(--greenTint);
  box-shadow:inset 0 0 0 1px rgba(107,191,138,.18);
}
.install-card-copy{flex:1;min-width:0;}
.install-card-title{
  margin:0 0 4px;
  font-size:15px;
  font-weight:900;
  color:var(--ink);
}
.install-card-desc{
  margin:0;
  color:var(--sub);
  font-size:12px;
  line-height:1.55;
}
.install-btn{
  flex:0 0 auto;
  min-height:42px;
  padding:0 14px;
  border:0;
  border-radius:14px;
  color:#fff;
  font-weight:900;
  background:linear-gradient(145deg,var(--green),#58AE78);
  box-shadow:0 8px 18px rgba(88,174,120,.23);
}
.install-btn:active{transform:translateY(2px) scale(.985);}
.install-sheet{
  position:fixed;
  inset:0;
  z-index:80;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding:16px;
  background:rgba(28,44,34,.42);
  backdrop-filter:blur(8px);
}
.install-sheet-box{
  width:min(100%,520px);
  background:#fff;
  border-radius:26px;
  padding:22px;
  box-shadow:var(--shadow-lg);
  animation:sheetUp .28s ease both;
}
.install-sheet-handle{
  width:42px;height:5px;
  border-radius:999px;
  margin:0 auto 16px;
  background:#D8DED9;
}
.install-sheet-title{
  margin:0 0 8px;
  font-size:20px;
  font-weight:900;
  text-align:center;
}
.install-sheet-text{
  margin:0 0 16px;
  color:var(--sub);
  font-size:13px;
  line-height:1.7;
  text-align:center;
}
.install-steps{
  display:grid;
  gap:10px;
  margin-bottom:16px;
}
.install-step{
  display:flex;
  gap:12px;
  align-items:flex-start;
  padding:12px 13px;
  border-radius:15px;
  background:#F8FAF8;
  border:1px solid var(--line);
}
.install-step-num{
  width:28px;height:28px;
  flex:0 0 28px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:var(--green);
  color:#fff;
  font-weight:900;
  font-size:12px;
}
.install-step b{display:block;margin-bottom:2px;}
.install-step span{font-size:12px;color:var(--sub);line-height:1.55;}
.install-close{
  width:100%;
  min-height:48px;
  border:0;
  border-radius:15px;
  background:var(--ink);
  color:#fff;
  font-weight:900;
}
@keyframes sheetUp{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:none}
}
@media(max-width:480px){
  .install-card{align-items:flex-start;flex-wrap:wrap;}
  .install-card-copy{min-width:calc(100% - 68px);}
  .install-btn{width:100%;}
}

    ["낮잠/휴식 운영","예: 낮잠 없음, 휴식 30분"],["입학 초 적응 프로그램","예: 첫 2주 단축수업"],
    ["배변실수 등 생활지도","예: 여벌옷 보관"],
  ]},
  { name:"소통·입학", fields:[
    ["키즈노트/사진 빈도","예: 주 2~3회"],["모집 방식 / 일정","예: 처음학교로, 11월 초"],
    ["작년 경쟁률","예: 약 1.5:1"],
  ]},
];
const FINAL_Q = [
  { v:3, label:"망설임 없이 “네!”" },
  { v:2, label:"조금 더 고민해 보고 싶다" },
  { v:1, label:"다른 유치원이 더 끌린다" },
];
const STORAGE_KEY = "dojun-kg-notebook-v2";

/* ============ 상태 ============ */
let data = { kindergartens: [] };
let view = "list";
let selId = null;
let detailTab = "score";
let openInfoGroup = 0;
let confirmDel = false;
let saveTimer = null;

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) data = JSON.parse(raw);
  }catch(e){ console.warn("load failed", e); }
}
function save(){
  const el = document.getElementById("saveState");
  el.textContent = "저장 중…";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      el.textContent = "✓ 저장됨";
      setTimeout(()=>{ el.textContent = ""; }, 1500);
    }catch(e){
      el.textContent = "저장 실패";
    }
  }, 300);
}

function newKg(){
  return {
    id: Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    name:"", scores:{}, disq:{}, info:{},
    firstImpression:0, finalQ:0, memo:"",
    updatedAt: Date.now(),
  };
}
function getKg(id){ return data.kindergartens.find(k=>k.id===id); }
function touch(kg){ kg.updatedAt = Date.now(); }
function updateKg(id, patch){
  const kg = getKg(id);
  Object.assign(kg, patch);
  save(); render();
}
function catScore(kg, cat){
  const vals = cat.items.map((_,i)=>kg.scores[cat.id+"-"+i]).filter(v=>v>=1);
  if(!vals.length) return null;
  return Math.round((vals.reduce((a,b)=>a+b,0)/vals.length/5)*cat.weight*10)/10;
}
function totalScore(kg){
  let sum=0, any=false;
  for(const c of CATEGORIES){ const s=catScore(kg,c); if(s!==null){ sum+=s; any=true; } }
  return any ? Math.round(sum*10)/10 : null;
}
function filledCount(kg){ return Object.values(kg.scores).filter(v=>v>=1).length; }
function disqCount(kg){ return DISQ.filter((_,i)=>kg.disq[i]==="X").length; }
function esc(s){ return (s||"").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

/* ============ 렌더링 ============ */
function stampHtml(score, size){
  size = size||64;
  const has = score!==null && score!==undefined;
  return `<div class="stamp ${has?'filled':'empty'}" style="width:${size}px;height:${size}px;">
    <span class="num" style="font-size:${size*0.34}px;">${has?score:'—'}</span>
    <span class="den" style="font-size:${size*0.15}px; color:${has?'var(--ink)':'var(--sub)'};">/ 100</span>
  </div>`;
}

function renderDetail(kg){

  let head = `<div class="card detail-head">

        body += `<div class="item-row">
          <div class="item-label">
            <span class="type-badge" style="color:${tm.color}; background:${tm.bg};">${tm.label}</span>

      });

    body += `<div class="section-title"><span class="dot"></span><h3 class="jua">🚫 결격 체크 (기본 조건)</h3></div>`;
    body += `<div class="card" style="overflow:hidden; border:1.5px solid ${dq>0?'var(--coral)':'var(--line)'};">
      <div class="disq-hdr">대부분 원이 기본으로 갖춘 항목이에요. 하나라도 X면 점수와 무관하게 보류!</div>`;

        <div class="q-cat-title">${cat.name}${cat.star?' ⭐':''}</div>
        <div class="q-list">`;
      copyText += `\\n■ ${cat.name}\\n`;
      cat.items.forEach(item=>{
        const [label, type, question] = item;
        const tm = TYPE_META[type];
        const icon = type==='O'?'👀':type==='R'?'📄':'💬';
        body += `<div class="q-item">

    });

    body += `<div class="q-cat">
      <div class="q-cat-title">🚫 결격 확인</div>

      body += `<div class="q-item">

        <div><div class="q-text">${esc(how)}</div><div class="q-sub">→ ${esc(label)}</div></div>

      copyText += `• ${how}\\n`;

    body += `</div></div>`;
    // 마지막 필수 질문
    body += `<div class="q-cat">
      <div class="q-cat-title">🌱 마지막에 꼭</div>
      <div class="q-list">
        <div class="q-item"><span class="type-badge" style="color:var(--green); background:var(--greenTint);">질문</span><div class="q-text">💬 만3세 모집 정원과 학급 수는 어떻게 되나요?</div></div>

  let delZone = `<div class="del-zone">`;

      <button class="btn-cancel" id="delCancelBtn">취소</button>

  delZone += `</div>`;

  return head + tabs + body + delZone;
}

function renderCompare(){
  const kgs = [...data.kindergartens].sort((a,b)=>(totalScore(b)??-1)-(totalScore(a)??-1));
  if(kgs.length===0){
    return `<div style="text-align:center; padding:60px 20px; color:var(--sub); font-size:14px; line-height:1.7;">
      아직 등록된 유치원이 없어요.<br>목록에서 유치원을 추가하고 점수를 매겨 보세요.
    </div>`;
  }
  const best = kgs.find(k=>totalScore(k)!==null && disqCount(k)===0);
  let html = "";
  if(best){
    html += `<div class="card best-card">
      ${stampHtml(totalScore(best),68)}
      <div>
        <div class="best-label">현재 1순위</div>
        <div class="jua best-name">${esc(best.name)||'이름 미입력'}</div>
        ${best.firstImpression>0?`<div style="color:var(--yellow); font-size:14px;">${'★'.repeat(best.firstImpression)}<span style="color:var(--line)">${'★'.repeat(5-best.firstImpression)}</span></div>`:''}
      </div>
    </div>`;
  }

  html += `<div class="card table-wrap"><table>
    <thead><tr><th class="label-col">항목</th>
    ${kgs.map(k=>`<th><button class="link-btn" data-open="${k.id}">${esc(k.name)||'미입력'}</button></th>`).join('')}
    </tr></thead><tbody>
    <tr class="total-row"><td class="label-col" style="font-weight:800;">총점</td>
    ${kgs.map(k=>`<td class="big">${totalScore(k)??'—'}</td>`).join('')}
    </tr>`;
  CATEGORIES.forEach(c=>{
    html += `<tr><td class="label-col">${c.name} <span style="color:var(--sub); font-size:11px;">/${c.weight}</span></td>
    ${kgs.map(k=>`<td>${catScore(k,c)??'—'}</td>`).join('')}
    </tr>`;
  });
  html += `<tr><td class="label-col" style="color:var(--coral); font-weight:700;">결격(X)</td>
    ${kgs.map(k=>{ const d=disqCount(k); return `<td style="color:${d?'var(--coral)':'var(--sub)'}; font-weight:${d?800:400};">${d?d+'건':'없음'}</td>`; }).join('')}
    </tr>
    <tr><td class="label-col">첫인상</td>
    ${kgs.map(k=>`<td style="color:#C9971C;">${k.firstImpression?'★'.repeat(k.firstImpression):'—'}</td>`).join('')}
    </tr>
    <tr><td class="label-col">바로 결정?</td>
    ${kgs.map(k=>`<td style="font-size:12px;">${k.finalQ===3?'네!':k.finalQ===2?'고민':k.finalQ===1?'다른 곳':'—'}</td>`).join('')}
    </tr>
    <tr><td class="label-col">평가 진행</td>
    ${kgs.map(k=>`<td style="color:var(--sub); font-size:12px;">${filledCount(k)}/${TOTAL_ITEMS}</td>`).join('')}
    </tr>
    </tbody></table></div>`;

  html += `<p class="hint">⚖️ 총점 순으로 정렬돼요. <b>처음학교로</b> 접수 땐 1·2·3지망이 필요하니
    총점 + 첫인상 + 결격 여부를 함께 보고 순위를 정하세요. 점수가 비슷하면 첫인상이 답인 경우가 많아요.</p>`;

  return html;
}

function render(){
  const main = document.getElementById("main");
  const backBtn = document.getElementById("backBtn");
  const subtitle = document.getElementById("subtitleText");

  document.querySelectorAll(".nav-tab").forEach(btn=>{
    const v = btn.dataset.view;
    btn.classList.toggle("active", view===v || (v==="list" && view==="detail"));
  });

  if(view==="list"){
    backBtn.style.display = "none";
    subtitle.textContent = "2027학년도 입학 준비";
    main.innerHTML = renderList();
  } else if(view==="detail"){
    backBtn.style.display = "inline-block";
    subtitle.textContent = "상담 기록하기";
    const kg = getKg(selId);
    if(!kg){ view="list"; render(); return; }
    main.innerHTML = renderDetail(kg);
  } else {
    backBtn.style.display = "inline-block";
    subtitle.textContent = "한눈에 비교하기";
    main.innerHTML = renderCompare();
  }
  bindEvents();
}

function bindEvents(){
  const main = document.getElementById("main");

  main.querySelectorAll("[data-open]").forEach(el=>{
    el.addEventListener("click", ()=>{
      selId = el.dataset.open; view="detail"; detailTab="score"; confirmDel=false; render();
    });
  });

  const installGuideBtn = document.getElementById("installGuideBtn");
  if(installGuideBtn) installGuideBtn.addEventListener("click", handleInstallAction);

  const exportBtn = document.getElementById("exportBtn");
  if(exportBtn) exportBtn.addEventListener("click", exportData);
  const importBtn = document.getElementById("importBtn");
  if(importBtn) importBtn.addEventListener("click", ()=>{ document.getElementById("importFileInput").click(); });

  const addBtn = document.getElementById("addKgBtn");
  if(addBtn) addBtn.addEventListener("click", ()=>{
    const kg = newKg();
    data.kindergartens.push(kg);
    selId = kg.id; view="detail"; detailTab="score"; confirmDel=false;
    save(); render();
  });

  const nameInput = document.getElementById("kgNameInput");
  if(nameInput) nameInput.addEventListener("input", (e)=>{
    const kg = getKg(selId); kg.name = e.target.value; touch(kg); save();
    // 헤더 재계산 없이 목록/비교에 반영되도록만 저장 (입력 중 재렌더 방지)
  });
  if(nameInput) nameInput.addEventListener("blur", render);

  main.querySelectorAll(".tab-btn").forEach(el=>{
    el.addEventListener("click", ()=>{ detailTab = el.dataset.tab; render(); });
  });

  const copyBtn = document.getElementById("copyQBtn");
  if(copyBtn) copyBtn.addEventListener("click", ()=>{
    const text = copyBtn.dataset.copy;
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(()=>toast("📋 질문 리스트를 복사했어요")).catch(()=>fallbackCopy(text));
    } else { fallbackCopy(text); }
  });

  main.querySelectorAll("[data-score-cat]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const kg = getKg(selId);
      const key = el.dataset.scoreCat+"-"+el.dataset.scoreIdx;
      const v = parseInt(el.dataset.scoreVal,10);
      kg.scores[key] = (kg.scores[key]===v) ? 0 : v;
      touch(kg); save(); render();
    });
  });

  main.querySelectorAll("[data-disq-idx]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const kg = getKg(selId);
      const i = el.dataset.disqIdx;
      const v = el.dataset.disqVal;
      kg.disq[i] = (kg.disq[i]===v) ? "" : v;
      touch(kg); save(); render();
    });
  });

  main.querySelectorAll("[data-star]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const kg = getKg(selId);
      const v = parseInt(el.dataset.star,10);
      kg.firstImpression = (kg.firstImpression===v) ? 0 : v;
      touch(kg); save(); render();
    });
  });

  main.querySelectorAll("[data-finalq]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const kg = getKg(selId);
      const v = parseInt(el.dataset.finalq,10);
      kg.finalQ = (kg.finalQ===v) ? 0 : v;
      touch(kg); save(); render();
    });
  });

  const memoInput = document.getElementById("memoInput");
  if(memoInput) memoInput.addEventListener("input", (e)=>{
    const kg = getKg(selId); kg.memo = e.target.value; touch(kg); save();
  });

  main.querySelectorAll("[data-infogroup]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const gi = parseInt(el.dataset.infogroup,10);
      openInfoGroup = (openInfoGroup===gi) ? -1 : gi;
      render();
    });
  });

  main.querySelectorAll("[data-info-label]").forEach(el=>{
    el.addEventListener("input", (e)=>{
      const kg = getKg(selId);
      kg.info[el.dataset.infoLabel] = e.target.value;
      touch(kg); save();
    });
  });

  const delAsk = document.getElementById("delAskBtn");
  if(delAsk) delAsk.addEventListener("click", ()=>{ confirmDel=true; render(); });
  const delCancel = document.getElementById("delCancelBtn");
  if(delCancel) delCancel.addEventListener("click", ()=>{ confirmDel=false; render(); });
  const delConfirm = document.getElementById("delConfirmBtn");
  if(delConfirm) delConfirm.addEventListener("click", ()=>{
    data.kindergartens = data.kindergartens.filter(k=>k.id!==selId);
    view="list"; confirmDel=false;
    save(); render();
  });
}

/* ============ 내보내기 / 불러오기 ============ */
function pad2(n){ return String(n).padStart(2,"0"); }

function exportData(){
  const now = new Date();
  const stamp = `${now.getFullYear()}${pad2(now.getMonth()+1)}${pad2(now.getDate())}_${pad2(now.getHours())}${pad2(now.getMinutes())}`;
  const payload = { app:"dojun-kg-notebook", exportedAt: Date.now(), kindergartens: data.kindergartens };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type:"application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `유치원_수첩_데이터_${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast("📤 파일로 내보냈어요. 카톡·메일로 보내보세요.");
}

function closeModal(){ document.getElementById("modalRoot").innerHTML = ""; }

function showImportModal(imported){
  const incoming = Array.isArray(imported.kindergartens) ? imported.kindergartens : [];
  if(incoming.length===0){
    toast("⚠️ 올바른 데이터 파일이 아니에요.");
    return;
  }
  const localIds = new Set(data.kindergartens.map(k=>k.id));
  const overlap = incoming.filter(k=>localIds.has(k.id)).length;
  const fresh = incoming.length - overlap;

  document.getElementById("modalRoot").innerHTML = `
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal-box">
      <div class="modal-title jua">📥 불러온 데이터 확인</div>
      <div class="modal-body">
        불러온 파일에 유치원 <b>${incoming.length}곳</b> 기록이 있어요.<br>
        · 새로운 유치원: <b>${fresh}곳</b><br>
        · 이미 있는 유치원과 겹침: <b>${overlap}곳</b> (겹치는 건 더 최근에 수정된 쪽으로 자동 반영돼요)
      </div>
      <div class="modal-actions" style="margin-bottom:8px;">
        <button class="confirm" id="mergeBtn">병합하기 (추천)</button>
      </div>
      <div class="modal-actions">
        <button class="cancel" id="replaceBtn" style="color:var(--coral);">전체 교체</button>
        <button class="cancel" id="cancelImportBtn">취소</button>
      </div>
    </div>
  </div>`;

  document.getElementById("mergeBtn").addEventListener("click", ()=>{
    mergeImport(incoming); closeModal();
  });
  document.getElementById("replaceBtn").addEventListener("click", ()=>{
    data.kindergartens = incoming;
    save(); render(); closeModal();
    toast(`✅ 전체 교체 완료 (${incoming.length}곳)`);
  });
  document.getElementById("cancelImportBtn").addEventListener("click", closeModal);
  document.getElementById("modalBackdrop").addEventListener("click", (e)=>{
    if(e.target.id==="modalBackdrop") closeModal();
  });
}

function mergeImport(incoming){
  let added=0, updated=0;
  incoming.forEach(inKg=>{
    const local = getKg(inKg.id);
    if(!local){
      data.kindergartens.push(inKg); added++;
    } else {
      const localTime = local.updatedAt||0, inTime = inKg.updatedAt||0;
      if(inTime >= localTime){
        Object.assign(local, inKg); updated++;
      }
    }
  });
  save(); render();
  toast(`✅ 병합 완료 (신규 ${added}곳, 갱신 ${updated}곳)`);
}

function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); toast("📋 질문 리스트를 복사했어요"); }
  catch(e){ toast("⚠️ 복사 실패 — 길게 눌러 직접 복사해주세요"); }
  document.body.removeChild(ta);
}

function toast(msg){
  const root = document.getElementById("toastRoot");
  root.innerHTML = `<div class="toast">${msg}</div>`;
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>{ root.innerHTML=""; }, 3000);
}


/* ============ 홈 화면 추가 안내 ============ */
let deferredInstallPrompt = null;

function isStandaloneMode(){
  return window.matchMedia("(display-mode: standalone)").matches ||
         window.navigator.standalone === true;
}

function getDeviceType(){
  const ua = navigator.userAgent || "";
  if(/iPad|iPhone|iPod/.test(ua) || (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1)) return "ios";
  if(/Android/i.test(ua)) return "android";
  return "other";
}

window.addEventListener("beforeinstallprompt", (e)=>{
  e.preventDefault();
  deferredInstallPrompt = e;
});

async function handleInstallAction(){
  if(deferredInstallPrompt){
    deferredInstallPrompt.prompt();
    try{ await deferredInstallPrompt.userChoice; }catch(e){}
    deferredInstallPrompt = null;
    return;
  }
  showInstallGuide();
}

function showInstallGuide(){
  const device = getDeviceType();
  let title = "홈 화면에 추가하는 방법";
  let text = "사용 중인 브라우저 메뉴에서 홈 화면 추가 기능을 선택해 주세요.";
  let steps = [];

  if(device==="ios"){
    title = "아이폰 홈 화면에 추가";
    text = "아이폰은 보안상 자동 설치가 불가능해 Safari에서 아래 순서로 한 번만 추가해야 합니다.";
    steps = [
      ["1","Safari에서 열기","카카오톡 안 브라우저가 아니라 Safari로 이 페이지를 열어 주세요."],
      ["2","공유 버튼 누르기","화면 아래의 네모 위로 화살표 모양 공유 버튼을 누르세요."],
      ["3","홈 화면에 추가","메뉴에서 ‘홈 화면에 추가’를 선택한 뒤 오른쪽 위 ‘추가’를 누르세요."]
    ];
  }else if(device==="android"){
    title = "안드로이드 홈 화면에 추가";
    text = "Chrome에서 아래 순서로 추가하면 앱처럼 바로 실행할 수 있습니다.";
    steps = [
      ["1","Chrome에서 열기","현재 페이지를 Chrome 브라우저에서 열어 주세요."],
      ["2","점 3개 메뉴","오른쪽 위 점 3개 메뉴를 누르세요."],
      ["3","홈 화면에 추가","‘홈 화면에 추가’ 또는 ‘앱 설치’를 누른 뒤 확인하세요."]
    ];
  }else{
    steps = [
      ["1","브라우저 메뉴 열기","Chrome, Edge 또는 Safari의 공유·설정 메뉴를 여세요."],
      ["2","홈 화면 또는 앱 설치","‘홈 화면에 추가’나 ‘앱 설치’ 항목을 선택하세요."]
    ];
  }

  const root = document.getElementById("modalRoot");
  root.innerHTML = `<div class="install-sheet" id="installSheet">
    <div class="install-sheet-box" role="dialog" aria-modal="true" aria-labelledby="installSheetTitle">
      <div class="install-sheet-handle"></div>
      <h2 class="install-sheet-title" id="installSheetTitle">${title}</h2>
      <p class="install-sheet-text">${text}</p>
      <div class="install-steps">
        ${steps.map(s=>`<div class="install-step">
          <div class="install-step-num">${s[0]}</div>
          <div><b>${s[1]}</b><span>${s[2]}</span></div>
        </div>`).join("")}
      </div>
      <button class="install-close" id="installCloseBtn">확인</button>
    </div>
  </div>`;

  document.getElementById("installCloseBtn").addEventListener("click", closeModal);
  document.getElementById("installSheet").addEventListener("click",(e)=>{
    if(e.target.id==="installSheet") closeModal();
  });
}

window.addEventListener("appinstalled", ()=>{
  deferredInstallPrompt = null;
  toast("✅ 홈 화면에 추가됐어요.");
  render();
});


document.getElementById("importFileInput").addEventListener("change", (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const imported = JSON.parse(ev.target.result);
      showImportModal(imported);
    }catch(err){
      toast("⚠️ 파일을 읽을 수 없어요. 올바른 JSON 파일인지 확인해주세요.");
    }
  };
  reader.readAsText(file);
  e.target.value = "";
});

document.getElementById("backBtn").addEventListener("click", ()=>{ view="list"; render(); });
document.querySelectorAll(".nav-tab").forEach(btn=>{
  btn.addEventListener("click", ()=>{ view = btn.dataset.view; render(); });
});


/* ============ PWA 등록 및 자동 업데이트 ============ */
let pwaRefreshing = false;

function showPwaUpdateBanner(registration){
  if(document.getElementById("pwaUpdateBanner")) return;

  const banner = document.createElement("div");
  banner.className = "update-banner";
  banner.id = "pwaUpdateBanner";
  banner.innerHTML = `
    <div class="update-banner-copy">
      <div class="update-banner-title">🌿 새 버전이 준비됐어요</div>
      <div class="update-banner-desc">기록은 유지되고 화면과 기능만 업데이트됩니다.</div>
    </div>
    <button type="button" id="pwaUpdateBtn">업데이트</button>
  `;
  document.body.appendChild(banner);

  document.getElementById("pwaUpdateBtn").addEventListener("click", ()=>{
    if(registration.waiting){
      registration.waiting.postMessage({type:"SKIP_WAITING"});
    }
  });
}

if("serviceWorker" in navigator){
  window.addEventListener("load", async ()=>{
    try{
      const registration = await navigator.serviceWorker.register("./sw.js", {scope:"./"});

      if(registration.waiting){
        showPwaUpdateBanner(registration);
      }

      registration.addEventListener("updatefound", ()=>{
        const worker = registration.installing;
        if(!worker) return;
        worker.addEventListener("statechange", ()=>{
          if(worker.state==="installed" && navigator.serviceWorker.controller){
            showPwaUpdateBanner(registration);
          }
        });
      });

      setInterval(()=>registration.update(), 60 * 60 * 1000);
    }catch(error){
      console.warn("Service Worker registration failed:", error);
    }
  });

  navigator.serviceWorker.addEventListener("controllerchange", ()=>{
    if(pwaRefreshing) return;
    pwaRefreshing = true;
    window.location.reload();
  });
}

load();
render();
</script>
